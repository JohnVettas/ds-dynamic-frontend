name: Deploy Frontend to Pages

on:
  push:
    branches: ["main"] # Ensure this matches your branch name (main or master)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with Parcel
        # This creates the 'dist' folder
        run: npm run build 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Parcel outputs everything to the 'dist' folder
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4