<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">

    <header>
        <a href="https://www.ds.unipi.gr/">
            <img id="logo" src="/logo_unipi.5c837ca1.svg">
        </a>   

    </header>

        <div class="loginWrapper">
            <div class="loginBox">
                <h1>Σύνδεση ως Διαχειριστής</h1>
                <form id="loginForm">
                    <label for="username">
                        <img src="/username.e8e1e2d8.svg" width="18" height="18">
                        Όνομα Χρήστη:
                    </label><br>
                    <input type="text" id="username" name="username" style="border-radius: 8px; width: 310px; height: 50px" required=""><br><br>

                    <label for="password">
                        <img src="/password.38bd3118.svg" width="18" height="18">
                        Κωδικός:
                    </label><br>

                    <div class="password-box">
                        <input type="password" id="password" name="password" style="border-radius: 8px; width: 310px; height: 50px" required=""><br><br>
                        <i id="ShowPassword" class="fa-regular fa-eye-slash"></i> 
                    </div>
                    
                    <input type="submit" value="Συνδεση" class="connectBtn">
                </form>
            </div>
        </div>
