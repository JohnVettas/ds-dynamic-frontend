<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Η σελίδα δεν βρέθηκε</title>
    
    <link rel="stylesheet" href="style/404.css">
</head>
<body>

    <header class="unipi-header">
        <div class="header-left">
            <img src="images/logo_unipi.svg" alt="Λογότυπο Πανεπιστημίου Πειραιώς" class="unipi-logo">
        </div>

        <div class="header-center" id="ModeDuck">
            <p class="duck-text">Ducky Mode:</p>
            <div class="duck-btn-group">
                <button id="btn-click" class="duck-btn">Click</button>
                <button id="btn-follow" class="duck-btn active">Follow</button>
                <button id="btn-stop" class="duck-btn">Stop</button>
            </div>
        </div>

        <div class="header-right">
            <button id="btn-toggle" class="duck-btn">Hide Ducky</button>
        </div>

        <div class="dropdown">
            <img id="settings" src="images/settings.svg" alt="settings" class="dropdown-button">
            
            <div id="settings-menu" class="dropdown-content">
                <a href="./politiki-cookies" target="_blank" style="color: white; text-decoration: none;">Πολιτική Cookies & Δεδομένων</a>
                <label class="dropdown-checkbox">
                    Theme
                    <input type="checkbox" id="dark-mode-toggle">   
                    <div class="slider">
                        <img id = "sun" src="images/sun.svg"/>
                        <img id = "moon" src="images/moon.svg"/>
                    </div>              
                </label>
            </div>
        </div>
    </header>

    <main class="error-container">
        <div class="error-box">
            <h1>404</h1>
            <h2>Η σελίδα δεν βρέθηκε</h2>
            <p>Μάλλον χάθηκες στα εξάμηνα!</p>
            
            <a href="/" class="home-btn">Επιστροφή στο Ημερολόγιο</a>
        </div>
        <div id="Ducky"></div>
        
        <script src="chase.js"></script> 
    </main>
</body>
</html>
