<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/login.css">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <header>
        <a href="https://www.ds.unipi.gr/">
            <img id="logo" src="images/logo_unipi.svg"></img>
        </a>

    </header>

    <div class='loginWrapper'>
        <div class='loginBox'>
            <h1>Σύνδεση ως Διαχειριστής</h1>
            <form id="loginForm">
                <label for="username">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="6" r="4" stroke="#ffffff" stroke-width="1.5" />
                        <path
                            d="M19.9975 18C20 17.8358 20 17.669 20 17.5C20 15.0147 16.4183 13 12 13C7.58172 13 4 15.0147 4 17.5C4 19.9853 4 22 12 22C14.231 22 15.8398 21.8433 17 21.5634"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                    Όνομα Χρήστη:
                </label><br>
                <input type="text" id="username" name="username" style="border-radius: 8px; width:310px; height: 50px;"
                    required><br><br>

                <label for="password">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22 12C22 15.7712 22 17.6569 20.8284 18.8284C19.6569 20 17.7712 20 14 20H10C6.22876 20 4.34315 20 3.17157 18.8284C2 17.6569 2 15.7712 2 12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C21.4816 5.82475 21.7706 6.69989 21.8985 8"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
                        <path
                            d="M9 12C9 12.5523 8.55228 13 8 13C7.44772 13 7 12.5523 7 12C7 11.4477 7.44772 11 8 11C8.55228 11 9 11.4477 9 12Z"
                            fill="#ffffff" />
                        <path
                            d="M13 12C13 12.5523 12.5523 13 12 13C11.4477 13 11 12.5523 11 12C11 11.4477 11.4477 11 12 11C12.5523 11 13 11.4477 13 12Z"
                            fill="#ffffff" />
                        <path
                            d="M17 12C17 12.5523 16.5523 13 16 13C15.4477 13 15 12.5523 15 12C15 11.4477 15.4477 11 16 11C16.5523 11 17 11.4477 17 12Z"
                            fill="#ffffff" />
                    </svg>
                    Κωδικός:
                </label><br>

                <div class="password-box">
                    <input type="password" id="password" name="password"
                        style="border-radius: 8px; width: 310px; height: 50px;" required><br><br>
                    <i id="ShowPassword" class="fa-regular fa-eye-slash"></i>
                </div>

                <input type="submit" value="Συνδεση" class='connectBtn'>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>
